# SPDX-License-Identifier: GPL-3.0-or-later
---
name: Build container images
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  IMAGE_DESC: "defenestraOS - Cloud-native gaming and workstation OS"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue,defenestra,gaming,workstation"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        target:
          - defenestraos
          - defenestraos-nvidia
          - defenestraos-nvidia-open
          - defenestraos-handheld
          # defenestraos-handheld-nvidia - disabled: no NVIDIA handheld hardware exists currently
          # - defenestraos-handheld-nvidia
          # defenestraos-handheld-nvidia-open - disabled: no NVIDIA handheld hardware + Bazzite missing stable tag
          # - defenestraos-handheld-nvidia-open

    steps:
      - name: Prepare environment
        id: env
        run: |
          IMAGE_REGISTRY="${{ env.IMAGE_REGISTRY }}"
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}

          TARGET="${{ matrix.target }}"
          echo "IMAGE_NAME=${TARGET}" >> ${GITHUB_ENV}

          # Derive pretty name for image metadata
          case "$TARGET" in
            defenestraos)                      PRETTY="defenestraOS" ;;
            defenestraos-nvidia)               PRETTY="defenestraOS NVIDIA" ;;
            defenestraos-nvidia-open)          PRETTY="defenestraOS NVIDIA Open" ;;
            defenestraos-handheld)             PRETTY="defenestraOS Handheld" ;;
            defenestraos-handheld-nvidia)      PRETTY="defenestraOS Handheld NVIDIA" ;;
            defenestraos-handheld-nvidia-open) PRETTY="defenestraOS Handheld NVIDIA Open" ;;
          esac
          echo "VERSION_PRETTY=${PRETTY}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      # Login before build so buildah can pull base images from GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        id: build_image
        run: |
          sudo buildah build \
            --target ${{ matrix.target }} \
            --build-arg VERSION_TAG="${{ env.DEFAULT_TAG }}" \
            --build-arg VERSION_PRETTY="${{ env.VERSION_PRETTY }}" \
            --tag ${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} \
            --layers \
            --format docker \
            .

          # Tag all metadata tags
          for tag in ${{ steps.metadata.outputs.tags }}; do
            sudo buildah tag ${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} ${{ env.IMAGE_NAME }}:${tag}
          done

      - name: Push To GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
          for tag in ${{ steps.metadata.outputs.tags }}; do
            sudo podman push ${{ env.IMAGE_NAME }}:${tag} ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}
          done

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: 'v2.6.1'

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          for tag in ${{ steps.metadata.outputs.tags }}; do
            cosign sign -y --key env://COSIGN_PRIVATE_KEY $IMAGE_FULL:$tag
          done
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

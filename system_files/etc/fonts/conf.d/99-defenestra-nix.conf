<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- SPDX-License-Identifier: GPL-3.0-or-later -->
<!-- Pick up fonts shipped via Nix system + per-user profiles. -->
<fontconfig>
    <dir>/nix/var/nix/profiles/default/share/fonts</dir>
    <dir prefix="default">~/.nix-profile/share/fonts</dir>
</fontconfig>

# Expose Nix profile dirs to the systemd user session (GNOME Shell, portals,
# user services). User profile shadows system profile.
NIX_PROFILES=/nix/var/nix/profiles/default ${HOME}/.nix-profile
PATH=${HOME}/.nix-profile/bin:/nix/var/nix/profiles/default/bin:${PATH}
XDG_DATA_DIRS=${HOME}/.nix-profile/share:/nix/var/nix/profiles/default/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}
